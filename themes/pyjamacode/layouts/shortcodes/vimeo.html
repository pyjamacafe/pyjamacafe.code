{{- $id := .Get 0 | default (.Get "id") -}}
{{- $title := .Get "title" | default "Video" -}}
{{- $width := .Get "width" | default "100%" -}}
{{- $height := .Get "height" | default "auto" -}}
<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;margin:1rem 0;border-radius:6px;border:1px solid var(--border-color)">
  <iframe src="https://player.vimeo.com/video/{{ $id }}?title=0&amp;byline=0&amp;portrait=0&amp;badge=0&amp;autopause=0&amp;app_id=58479"
    style="position:absolute;top:0;left:0;width:100%;height:100%"
    frameborder="0"
    allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
    referrerpolicy="strict-origin-when-cross-origin"
    title="{{ $title }}"></iframe>
</div>
