{{- $id := .Get 0 | default (.Get "id") -}}
{{- $title := .Get "title" | default "Video" -}}
<div style="margin:1rem 0;position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:6px;border:1px solid var(--border-color)">
  <iframe src="https://player.vimeo.com/video/{{ $id }}?title=0&amp;byline=0&amp;portrait=0&amp;badge=0&amp;autopause=1&amp;controls=1&amp;app_id=58479"
    style="position:absolute;top:0;left:0;width:100%;height:100%"
    frameborder="0"
    allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
    referrerpolicy="strict-origin-when-cross-origin"
    title="{{ $title }}"
    loading="lazy"></iframe>
</div>
<div style="padding:0.25rem 0 0.75rem;font-size:0.8rem;color:var(--bs-secondary-color);text-align:center;border-bottom:1px solid var(--border-color);margin-bottom:1rem">{{ $title }}</div>
