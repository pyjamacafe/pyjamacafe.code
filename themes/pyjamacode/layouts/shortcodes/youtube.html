{{- $id := .Get 0 | default (.Get "id") -}}
{{- $title := .Get "title" | default "Video" -}}
<figure class="fig-center" style="max-width:90%">
  <div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border:1px solid var(--border-color);border-radius:4px">
    <iframe src="https://www.youtube.com/embed/{{ $id }}"
      style="position:absolute;top:0;left:0;width:100%;height:100%"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen
      title="{{ $title }}"></iframe>
  </div>
  <figcaption><a href="#fig-{{ $id }}" class="fig-link">Video:</a> {{ $title }}</figcaption>
</figure>
