{{ define "main" }}
<div class="container py-5">
  <h1 class="mb-4">{{ .Title }}</h1>
  {{ .Content }}
  <div class="list-group">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
      <span>{{ .Title }}</span>
      <span class="badge text-bg-secondary">{{ .Params.difficulty | default "easy" }}</span>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
