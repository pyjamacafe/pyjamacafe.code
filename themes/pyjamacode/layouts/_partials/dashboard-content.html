{{ $problems := where site.RegularPages "Section" "courses" }}
{{ $active := index $problems 0 }}
{{ $activeId := "" }}
{{ with $active }}{{ $activeId = .File.ContentBaseName }}{{ end }}

<script id="problem-data" type="application/json">
{{ $data := slice }}
{{ range $problems }}
  {{ $parts := split (strings.TrimSuffix "/" .File.Dir) "/" }}
  {{ $topic := index $parts 1 }}
  {{ $subtopic := index $parts 2 }}
  {{ $item := dict
    "id" .File.ContentBaseName
    "title" .Title
    "difficulty" .Params.difficulty
    "language" .Params.language
    "permalink" .RelPermalink
    "content" ""
    "article" ""
    "codes" ""
    "initial_code" ""
    "test_cases" .Params.test_cases
    "topic" $topic
    "subtopic" $subtopic
    "topic_weight" (cond (isset .Params "topic_weight") (.Params.topic_weight | int) 99)
    "subtopic_weight" (cond (isset .Params "subtopic_weight") (.Params.subtopic_weight | int) 99)
    "weight" (cond (isset .Params "weight") (.Params.weight | int) 99)
  }}
  {{ $data = $data | append $item }}
{{ end }}
{{ $data | jsonify | safeJS }}
</script>
<input type="hidden" id="active-problem-id" value="{{ $activeId }}">

<div class="platform-layout" id="platformLayout">
  <!-- Sidebar: Cases -->
  <aside class="platform-pane sidebar-pane" id="sidebarPane" style="width:25%">
    <div class="pane-header border-bottom">
      <input type="text" id="questionSearch" class="form-control form-control-sm" placeholder="Search cases...">
    </div>
    <div class="pane-body overflow-auto p-2">
      <div class="tree-container" id="questionList"></div>
    </div>
  </aside>

  <div class="pane-resizer" id="resizerCasesCase" aria-label="Resize cases pane"></div>

  <!-- Dashboard content -->
  <div class="landing-content" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bs-body-bg);overflow:hidden">
    <div id="dashboardContent" style="display:none;text-align:center">
      <h1 id="dashboardGreeting" style="font-size:2rem;font-weight:700;margin:0;color:var(--bs-body-color)">Welcome</h1>
      <p style="margin-top:0.5rem;font-size:1rem;color:var(--bs-secondary-color)">Your learning dashboard</p>
      <button id="dashboardResumeBtn" class="btn btn-primary btn-sm mt-3" style="display:none">Resume</button>
    </div>
    <div id="dashboardLoading" style="text-align:center">
      <div class="spinner-border text-secondary" role="status" style="width:2rem;height:2rem"><span class="visually-hidden">Loading...</span></div>
    </div>
  </div>
</div>

<div id="authModal" class="auth-modal-backdrop">
  <div class="auth-modal">
    <h3 id="authModalTitle">Sign In</h3>
    <div id="authError" class="auth-error"></div>
    <button id="authGoogleBtn" class="btn btn-outline-secondary w-100" style="margin-bottom:0.75rem">
      <i class="bi bi-google"></i> Sign in with Google
    </button>
    <hr style="margin:0.5rem 0;color:var(--border-color)">
    <input id="authEmail" type="email" class="form-control" placeholder="Email">
    <input id="authPassword" type="password" class="form-control" placeholder="Password">
    <button id="authActionBtn" class="btn btn-primary w-100">Sign In</button>
    <div class="auth-toggle">
      <span id="authToggleText">Don't have an account? </span>
      <a id="authToggleLink">Sign Up</a>
    </div>
    <div class="auth-toggle" style="margin-top:0.5rem">
      <a id="authCloseLink" style="color:var(--bs-secondary-color)">Close</a>
    </div>
  </div>
</div>

<script>
  (function() {
    var checkUser = function() {
      if (typeof getCurrentUser !== 'undefined' && getCurrentUser()) {
        var user = getCurrentUser();
        var name = user.displayName || user.email || 'User';
        var el = document.getElementById('dashboardGreeting');
        if (el) el.textContent = 'Welcome, ' + name;
        var content = document.getElementById('dashboardContent');
        var loading = document.getElementById('dashboardLoading');
        if (content) content.style.display = 'block';
        if (loading) loading.style.display = 'none';
        // Show resume button if there's a saved problem
        var resumeBtn = document.getElementById('dashboardResumeBtn');
        var saved = localStorage.getItem('lastProblemUrl');
        if (resumeBtn && saved && saved.includes('/courses/')) {
          resumeBtn.style.display = '';
          resumeBtn.onclick = function() { window.location.href = saved; };
        }
      } else if (typeof isAuthReady === 'undefined' || !isAuthReady()) {
        setTimeout(checkUser, 200);
      } else {
        window.location.href = '/';
      }
    };
    checkUser();
  })();
</script>
