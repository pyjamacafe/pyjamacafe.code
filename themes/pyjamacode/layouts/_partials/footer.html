<footer class="statusbar">
  <span class="statusbar-left"></span>
  <span class="statusbar-center">&copy; {{ now.Year }} {{ site.Params.author | default site.Title }}. All Rights Reserved.</span>
  <span class="statusbar-right">
    <button id="syncBtn" class="sync-btn d-none">
      <span id="syncIndicator" class="sync-indicator"><i class="bi bi-cloud-check"></i></span>
      <span id="syncLabel" class="sync-label">In sync</span>
    </button>
  </span>
</footer>

<dialog id="syncConfirmModal" class="reset-dialog">
  <h3>Unsaved Changes</h3>
  <div id="syncChangesList" style="margin:0 0 1rem;max-height:200px;overflow-y:auto;font-size:0.85rem;line-height:1.5"></div>
  <form method="dialog" class="d-flex flex-column gap-2">
    <button id="syncConfirmYes" class="btn btn-primary w-100">Sync Now</button>
    <button id="syncConfirmNo" class="btn btn-outline-secondary w-100" value="cancel">Cancel</button>
  </form>
</dialog>
